<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gestión de Novedades</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F0F1F6;color:#1E1E2E;font-size:13px}
:root{
  --p:#5B4FD4;--pl:#EDE9FF;--b:#1A6DB5;--bl:#E3F0FB;
  --g:#0D9F6E;--gl:#E3F9F2;--a:#C07314;--al:#FFF4E3;
  --r:#C0392B;--rl:#FDECEA;
  --bd:#E2E4EF;--mu:#6B7280;--card:#fff;--bg:#F0F1F6;
}
.hdr{background:linear-gradient(135deg,#4338CA,#1E1B4B);padding:16px 26px;display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;flex-direction:column;gap:4px}
.hdr-title{font-size:17px;font-weight:800;color:#fff}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.55)}
.hdr-right{text-align:right}
.hdr-cut{font-size:14px;font-weight:800;color:#fff;margin-bottom:2px}
.tabs-bar{background:#fff;border-bottom:2px solid var(--bd);padding:0 26px;display:flex}
.tab-btn{padding:11px 18px;font-size:12px;font-weight:600;color:var(--mu);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;align-items:center;gap:6px;transition:.12s;white-space:nowrap}
.tab-btn.active{color:var(--p);border-bottom-color:var(--p)}
.tab-btn:hover:not(.active){color:#1E1E2E}
.tpill{border-radius:10px;padding:1px 8px;font-size:10px;font-weight:700}
.pr{background:var(--rl);color:var(--r)} .pa{background:var(--al);color:var(--a)} .pb{background:var(--bl);color:var(--b)}
.toolbar{background:#fff;border-bottom:1px solid var(--bd);padding:8px 26px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-height:48px}
.tlbl{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.seg{display:flex;background:var(--bg);border-radius:7px;padding:3px;gap:2px;flex-wrap:wrap}
.sbtn{padding:4px 11px;border-radius:5px;border:none;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:var(--mu);transition:.12s;white-space:nowrap}
.sbtn.active{background:#fff;color:var(--p);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.srch{padding:5px 10px;border:1px solid var(--bd);border-radius:6px;font-family:inherit;font-size:12px;outline:none;min-width:170px}
.srch:focus{border-color:var(--p)}
.flex1{flex:1}
.rcount{font-size:11px;color:var(--mu)} .rcount strong{color:var(--p);font-weight:700}
.tc{display:none;flex-direction:column;gap:18px;padding:20px 26px} .tc.active{display:flex}
.slbl{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;display:flex;align-items:center;gap:8px} .slbl::after{content:'';flex:1;height:1px;background:var(--bd)}
.rcards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.rcard{background:var(--card);border-radius:12px;border:1px solid var(--bd);overflow:hidden;cursor:pointer;transition:.15s}
.rcard:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.09)}
.rcard.sel{outline:2px solid var(--rc);outline-offset:1px}
.rc-stripe{height:4px}
.rc-body{padding:12px 15px}
.rc-ini{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;margin-bottom:8px}
.rc-name{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.3px;line-height:1.4;margin-bottom:7px}
.rc-num{font-size:26px;font-weight:800;line-height:1;margin-bottom:2px}
.rc-sub{font-size:10px;color:var(--mu)}
.rc-foot{padding:6px 15px;border-top:1px solid var(--bd);display:flex;gap:10px;flex-wrap:wrap}
.rcf{font-size:10px;font-weight:600} .rcf em{font-weight:500;color:var(--mu);font-style:normal}
.acc-block{background:var(--card);border-radius:10px;border:1px solid var(--bd);overflow:hidden;border-left:3px solid var(--rc-stripe);margin-bottom:14px}
.acc-resp-hdr{padding:11px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.acc-resp-name{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.acc-resp-kpis{display:flex;gap:16px}
.akpi{text-align:right} .akpi-val{font-size:18px;font-weight:800;line-height:1} .akpi-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px}
.planta-row{border-bottom:1px solid var(--bd)} .planta-row:last-child{border-bottom:none}
.planta-hdr{padding:8px 16px;background:#F8F9FC;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.planta-hdr:hover{background:#EDEEF8}
.planta-name{font-size:12px;font-weight:700;color:#374151}
.chips{display:flex;gap:6px;align-items:center}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.cp{background:var(--rl);color:var(--r)} .cd{background:var(--al);color:var(--a)} .ch{background:var(--bl);color:var(--b)}
.chev{color:var(--mu);font-size:10px;transition:.15s;margin-left:2px}
.planta-hdr.open .chev{transform:rotate(90deg)}
.lineas-wrap{display:none;padding:0 16px 10px 40px} .lineas-wrap.open{display:block}
.lt{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.lt th{padding:5px 8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--mu);border-bottom:1px solid var(--bd)}
.lt th.r{text-align:right} .lt td{padding:5px 8px;border-bottom:1px solid #F0F1F6} .lt tr:last-child td{border:none} .lt td.r{text-align:right;font-variant-numeric:tabular-nums} .lt tr:hover td{background:#FAFBFF}
.db{display:inline-flex;align-items:center;justify-content:center;min-width:28px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.d0{background:var(--gl);color:var(--g)} .d1{background:#FFF3E0;color:#E65100} .d2{background:var(--rl);color:var(--r)} .d3{background:#7B0000;color:#fff}
.ftbl-wrap{background:var(--card);border-radius:10px;border:1px solid var(--bd);overflow:hidden}
.tsc{max-height:520px;overflow-y:auto}
.ft{width:100%;border-collapse:collapse;font-size:12px} .ft thead{position:sticky;top:0;z-index:2}
.ft th{background:#F7F8FC;padding:8px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--mu);border-bottom:2px solid var(--bd);white-space:nowrap;cursor:pointer}
.ft th:hover{background:#EDEFF8;color:var(--p)} .ft th.r{text-align:right}
.ft td{padding:7px 12px;border-bottom:1px solid #F0F1F6} .ft td.r{text-align:right;font-variant-numeric:tabular-nums}
.ft tr:hover td{background:#FAFBFF} .ft tfoot td{font-weight:700;background:#F7F8FC;border-top:2px solid var(--bd)}
.cbdg{display:inline-flex;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700}
.cB{background:var(--bl);color:var(--b)} .cS{background:var(--pl);color:var(--p)} .cT{background:var(--gl);color:var(--g)}
.panel{background:var(--card);border-radius:10px;border:1px solid var(--bd);overflow:hidden}
.ph{padding:13px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.pt{font-size:13px;font-weight:700}
.pbody{padding:18px}
.chart-box{position:relative}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.an-seg{display:flex;background:var(--bg);border-radius:7px;padding:3px;gap:2px;flex-wrap:wrap}
::-webkit-scrollbar{width:4px;height:4px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:#C4C7D4;border-radius:4px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <span class="hdr-title">Gestión de Novedades</span>
    <span class="hdr-sub">Período: 18 Feb – 26 Mar 2026</span>
  </div>
  <div class="hdr-right">
    <div class="hdr-cut">Corte: 27/03/2026</div>
  </div>
</div>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('in',this)">Inasistencias <span class="tpill pr" id="pill-in"></span></button>
  <button class="tab-btn" onclick="switchTab('ha',this)">Horas Adicionales <span class="tpill pa" id="pill-ha"></span></button>
  <button class="tab-btn" onclick="switchTab('an',this)">Análisis <span class="tpill pb">↗</span></button>
</div>

<div class="toolbar" id="tb">
  <span class="tlbl">Vista:</span>
  <div class="seg"><button class="sbtn active" id="vt" onclick="setView('tree')">Por Planta</button><button class="sbtn" id="vf" onclick="setView('flat')">Tabla</button></div>
  <span class="tlbl">Responsable:</span>
  <div class="seg" id="rseg"></div>
  <input class="srch" id="srch" placeholder="Buscar planta o línea…" oninput="applyF()">
  <div class="flex1"></div>
  <span class="rcount" id="rc"></span>
</div>

<div class="tc active" id="tc-in">
  <div><div class="slbl">Por Responsable</div><div class="rcards" id="in-rcards"></div></div>
  <div id="in-tree"></div>
  <div id="in-flat" style="display:none"><div class="ftbl-wrap"><div class="tsc"><table class="ft"><thead><tr id="in-th"></tr></thead><tbody id="in-tb"></tbody><tfoot><tr id="in-tf"></tr></tfoot></table></div></div></div>
</div>

<div class="tc" id="tc-ha">
  <div><div class="slbl">Por Responsable</div><div class="rcards" id="ha-rcards"></div></div>
  <div id="ha-tree"></div>
  <div id="ha-flat" style="display:none"><div class="ftbl-wrap"><div class="tsc"><table class="ft"><thead><tr id="ha-th"></tr></thead><tbody id="ha-tb"></tbody><tfoot><tr id="ha-tf"></tr></tfoot></table></div></div></div>
</div>

<div class="tc" id="tc-an">
  <div class="panel">
    <div class="ph"><span class="pt">Top Causas de Inasistencia por Responsable</span></div>
    <div class="pbody"><div class="chart-box" style="height:320px"><canvas id="c-causas"></canvas></div></div>
  </div>
  <div class="two-col">
    <div class="panel">
      <div class="ph"><span class="pt">Horas Programadas · Reales · Aprobadas</span></div>
      <div class="pbody"><div class="chart-box" style="height:280px"><canvas id="c-hrs"></canvas></div></div>
    </div>
    <div class="panel">
      <div class="ph">
        <span class="pt">Horas Extra vs Aprobadas — Semana a Semana</span>
        <div class="an-seg" id="hw-seg"></div>
      </div>
      <div class="pbody"><div class="chart-box" style="height:280px"><canvas id="c-hw"></canvas></div></div>
    </div>
  </div>
  <div class="panel">
    <div class="ph">
      <span class="pt">Evolución Semanal — Pendientes sin Gestionar</span>
      <div class="an-seg" id="pw-seg">
        <button class="sbtn active" onclick="switchPW('in',this)">Inasistencias</button>
        <button class="sbtn" onclick="switchPW('ha',this)">Horas Adicionales</button>
      </div>
    </div>
    <div class="pbody"><div class="chart-box" style="height:260px"><canvas id="c-pw"></canvas></div></div>
  </div>
</div>

        const hC=isHA?`<td class="r" style="color:var(--a);font-weight:600">${(l.HRS||0).toFixed(1)}</td>`:'';
        return`<tr><td>${l.LINEA_PROGRAMADA}</td><td class="r"><strong>${l.CANT}</strong></td><td class="r">${db(l.MAX_DIAS)}</td>${hC}</tr>`;
      }).join('');
      return`<div class="planta-row">
        <div class="planta-hdr" onclick="togP(this)">
          <span class="planta-name">${p}</span>
          <div class="chips"><span class="chip cp">${P.tot} pend.</span><span class="chip cd">máx. ${P.maxD}d</span>${hrsC}<span class="chev">›</span></div>
        </div>
        <div class="lineas-wrap"><table class="lt"><thead><tr><th>Línea</th><th class="r">Pend.</th><th class="r">Máx. Días</th>${thH}</tr></thead><tbody>${lns}</tbody></table></div>
      </div>`;
    }).join('');
    return`<div class="acc-block" style="--rc-stripe:${col};border-left-color:${col}">
      <div class="acc-resp-hdr" style="background:${lt}28">
        <span class="acc-resp-name" style="color:${col}">${resp}</span>
        <div class="acc-resp-kpis">
          <div class="akpi"><div class="akpi-val" style="color:${col}">${R.tot}</div><div class="akpi-lbl">pendientes</div></div>
          <div class="akpi"><div class="akpi-val" style="color:var(--a)">${R.maxD}d</div><div class="akpi-lbl">máx. días</div></div>
        </div>
      </div>${pls}</div>`;
  }).join('');
  setRC(total);
}
function togP(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}

function renderFlat(isHA){
  const data=rows(isHA),pfx=isHA?'ha':'in';
  const keys=['RESPONSABLE','CENTRO_PROGRAMADO','PLANTA_PROGRAMADA','LINEA_PROGRAMADA','CANT','MAX_DIAS','HRS'];
  const hdrs=['Responsable','Centro','Planta','Línea','Pend.','Máx. Días',...(isHA?['Hrs Extra']:[])];
  document.getElementById(pfx+'-th').innerHTML=hdrs.map((h,i)=>
    `<th class="${i>=4?'r':''}" onclick="sortF(${i})">${h} ${FS.col===i?(FS.asc?'↑':'↓'):'<span style="opacity:.3">↕</span>'}</th>`).join('');
  const k=keys[FS.col]||'CANT';
  const sorted=[...data].sort((a,b)=>{const v=a[k]>b[k]?1:a[k]<b[k]?-1:0;return FS.asc?v:-v;});
  let tp=0,th=0;
  document.getElementById(pfx+'-tb').innerHTML=sorted.map(r=>{
    tp+=r.CANT;th+=(r.HRS||0);
    const hC=isHA?`<td class="r" style="color:var(--a);font-weight:600">${(r.HRS||0).toFixed(1)}</td>`:'';
    return`<tr>
      <td style="color:${RC[r.RESPONSABLE]};font-weight:700;font-size:11px">${r.RESPONSABLE}</td>
      <td>${cb(r.CENTRO_PROGRAMADO)}</td><td>${r.PLANTA_PROGRAMADA}</td><td>${r.LINEA_PROGRAMADA}</td>
      <td class="r"><strong>${r.CANT}</strong></td><td class="r">${db(r.MAX_DIAS)}</td>${hC}</tr>`;
  }).join('');
  const hF=isHA?`<td class="r">${th.toFixed(1)}</td>`:'';
  document.getElementById(pfx+'-tf').innerHTML=`<td colspan="4">TOTAL</td><td class="r">${tp}</td><td></td>${hF}`;
  setRC(tp);
}
function sortF(c){if(FS.col===c)FS.asc=!FS.asc;else{FS.col=c;FS.asc=false;}render();}

function render(){
  renderRCards(false);renderRCards(true);
  ['in-tree','in-flat','ha-tree','ha-flat'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const mine=id.startsWith(TAB);
    const isTree=id.endsWith('tree');
    el.style.display=mine&&((VIEW==='tree'&&isTree)||(VIEW==='flat'&&!isTree))?'block':'none';
  });
  if(VIEW==='tree'){renderTree(false);renderTree(true);}
  else renderFlat(TAB==='ha');
}
function setRC(n){document.getElementById('rc').innerHTML=`<strong>${n.toLocaleString('es-CO')}</strong> pend.`;}

function buildAnalysis(){buildCausas();buildHrs();buildHW();buildPW();}

function buildCausas(){
  const resps=D.responsables;
  const datasets=D.top_causas.map((causa,i)=>{
    return{label:causa,data:resps.map(r=>D.causas_resp[r]?D.causas_resp[r][causa]||0:0),
      backgroundColor:CP[i%CP.length],borderRadius:3,borderSkipped:false,stack:'s'};
  });
  mkC('c-causas',{type:'bar',data:{labels:resps,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:10,font:{size:10}}},tooltip:{mode:'index',intersect:false}},
    scales:{x:{grid:{display:false},ticks:{maxRotation:25,font:{size:10}}},y:{grid:{color:'#F0F1F6'},stacked:true,title:{display:true,text:'Registros'}}}
  }});
}

function buildHrs(){
  mkC('c-hrs',{type:'bar',data:{
    labels:D.hrs_resp.map(r=>r.RESPONSABLE.split(' ')[0]+' '+r.RESPONSABLE.split(' ').slice(-1)[0]),
    datasets:[
      {label:'Programadas',data:D.hrs_resp.map(r=>r.HRS_PROG),backgroundColor:'rgba(91,79,212,.75)',borderRadius:3,borderSkipped:false},
      {label:'Reales',data:D.hrs_resp.map(r=>r.HRS_REAL),backgroundColor:'rgba(26,109,181,.75)',borderRadius:3,borderSkipped:false},
      {label:'Aprobadas',data:D.hrs_resp.map(r=>r.HRS_APRO),backgroundColor:'rgba(13,159,110,.75)',borderRadius:3,borderSkipped:false},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:10,padding:12,font:{size:11}}},tooltip:{mode:'index',intersect:false}},
      scales:{x:{grid:{display:false},ticks:{maxRotation:20,font:{size:10}}},y:{grid:{color:'#F0F1F6'},title:{display:true,text:'Horas'}}}}
  });
}

function buildHW(resp){
  resp=resp||HW_RESP;HW_RESP=resp;
  const seg=document.getElementById('hw-seg');
  seg.innerHTML=D.responsables.map(r=>
    `<button class="sbtn${r===resp?' active':''}" onclick="buildHW('${r}')" style="font-size:10px;padding:3px 8px;${r===resp?'color:'+RC[r]:''}">${r.split(' ')[0]}</button>`).join('');
  const col=RC[resp]||'#5B4FD4',wks=D.semanas;
  const rr=D.hrs_week.filter(r=>r.RESPONSABLE===resp);
  mkC('c-hw',{type:'bar',data:{
    labels:wks.map(w=>D.sem_labels[w]),
    datasets:[
      {type:'bar',label:'Hrs Extra',data:wks.map(w=>{const f=rr.find(r=>r.SEMANA===w);return f?f.HRS_EXTRA:0;}),backgroundColor:col+'BB',borderRadius:4,borderSkipped:false},
      {type:'line',label:'Aprobadas',data:wks.map(w=>{const f=rr.find(r=>r.SEMANA===w);return f?f.HRS_APRO:0;}),borderColor:'#0D9F6E',backgroundColor:'rgba(13,159,110,.08)',fill:true,borderWidth:2.5,pointRadius:5,pointBackgroundColor:'#0D9F6E',tension:.35}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:10,padding:12,font:{size:11}}},tooltip:{mode:'index',intersect:false}},
      scales:{x:{grid:{display:false}},y:{grid:{color:'#F0F1F6'},title:{display:true,text:'Horas'}}}}
  });
}

function switchPW(mode,btn){
  PW_MODE=mode;
  document.querySelectorAll('#pw-seg .sbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  buildPW();
}
function buildPW(){
  const src=PW_MODE==='in'?D.pend_week_in:D.pend_week_ha,wks=D.semanas;
  const datasets=D.responsables.map(resp=>{
    const col=RC[resp]||'#5B4FD4';
    return{label:resp,data:wks.map(w=>{const f=src.find(r=>r.RESPONSABLE===resp&&r.SEMANA===w);return f?f.CANT:0;}),
      borderColor:col,backgroundColor:col+'18',fill:true,borderWidth:2.5,pointRadius:5,pointBackgroundColor:col,tension:.35};
  });
  mkC('c-pw',{type:'line',data:{labels:wks.map(w=>D.sem_labels[w]),datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:10,padding:12,font:{size:11}}},tooltip:{mode:'index',intersect:false}},
      scales:{x:{grid:{display:false}},y:{grid:{color:'#F0F1F6'},title:{display:true,text:'Registros pendientes'}}}}
  });
}

document.getElementById('pill-in').textContent=D.in_total;
document.getElementById('pill-ha').textContent=D.ha_total;
buildSegs();renderRCards(false);renderRCards(true);renderTree(false);
</script>
</body>
</html>
